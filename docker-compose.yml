services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: hex
      POSTGRES_PASSWORD: hex
      POSTGRES_DB: hex
    volumes:
      - HexData:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hex -d hex"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  backend:
    build: ./Backend
    ports:
      # Direct host access to backend-only endpoints (engine registration, admin,
      # move-history analysis) and for the dev frontend / self-hosted engines.
      # Gameplay from the bundled frontend is proxied internally via nginx.
      - "3001:3001"
    environment:
      - PORT=3001
      - DATABASE_URL=postgres://hex:hex@postgres:5432/hex
      # Initial forfeit threshold (ms); changeable live from the admin interface.
      - ABANDON_TIMEOUT_MS=120000
      # Admin auth: dev mode (default true) lets anyone log into /Admin. In production set
      # ADMIN_DEV_LOGIN=false and provide trusted SSH public keys (newline-separated).
      - ADMIN_DEV_LOGIN=true
      # - ADMIN_PUBLIC_KEYS=ssh-ed25519 AAAA... admin@host
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build: ./Frontend
    ports:
      - "8080:80"
    environment:
      # Public address used in generated invite links; empty = whatever origin the visitor
      # opened (IP / localhost). Set to e.g. https://hex.icelabs.dev when deployed.
      - HEX_SERVER_URL=${HEX_SERVER_URL:-}
      # Backend base for API/WS/admin calls; empty = same origin via the nginx proxy. Set to
      # e.g. https://hex.icelabs.dev if the backend is exposed on its own host.
      - HEX_BACKEND_URL=${HEX_BACKEND_URL:-}
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  HexData:
