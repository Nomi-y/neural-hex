name: Build and Push Image

# Builds the training container and pushes it to GHCR so a VPS can pull it.
#
#   • Manual:  Actions → "Build and Push Image" → Run workflow → pick a preset.
#   • Auto:    every push to the `images` branch (uses hyperparams.toml as committed).
#
# Pull on the VPS (package must be public — see README "Deploy via GHCR"):
#   docker pull ghcr.io/<owner>/neural-hex:latest

on:
  workflow_dispatch:
    inputs:
      preset:
        description: "Preset to bake in (none = hyperparams.toml as committed)"
        type: choice
        default: none
        options:
          - none
          - smoke
          - cpu-balanced
          - cuda-balanced
          - cuda-large
          - cuda-moon
          - cuda-affordable-11
          - cuda-5090
          - cuda-5090-13
      cuda:
        description: "Install the CUDA torch wheel (GPU image)"
        type: boolean
        default: true
      cuda_wheel:
        description: "CUDA wheel — 'default' picks the safe fleet value (cu121) or the preset's override (cu128 for cuda-5090)"
        type: choice
        default: default
        options:
          - default
          - cu121
          - cu118
          - cu124
          - cu126
          - cu128
  push:
    branches: [images]

concurrency:
  group: build-image-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # The CUDA torch wheel is large; clear the runner's preinstalled SDKs so the
      # image build doesn't hit "no space left on device".
      - name: Free up runner disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android \
                      /usr/local/.ghcup /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force || true
          df -h /

      - name: Resolve preset, CUDA flag, and image tags
        id: cfg
        run: |
          PRESET="${{ github.event.inputs.preset }}"
          [ -z "$PRESET" ] && PRESET="none"
          CUDA="${{ github.event.inputs.cuda }}"
          [ -z "$CUDA" ] && CUDA="true"
          CUDA_WHEEL="${{ github.event.inputs.cuda_wheel }}"
          [ -z "$CUDA_WHEEL" ] && CUDA_WHEEL="cu121"
          [ "$CUDA_WHEEL" = "default" ] && CUDA_WHEEL="cu121"
          # Blackwell (RTX 5090, sm_120) has no kernels in cu121 — force cu128 unless overridden.
          # Matches every 5090 preset (cuda-5090, cuda-5090-13, …).
          case "$PRESET" in
            cuda-5090*)
              if [ "$CUDA_WHEEL" = "cu121" ]; then
                CUDA_WHEEL="cu128"
                echo "note: $PRESET preset → forcing CUDA_WHEEL=cu128 (Blackwell sm_120)"
              fi ;;
          esac

          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          IMAGE="ghcr.io/${OWNER}/neural-hex"
          SHORT="${GITHUB_SHA::7}"
          if [ "$PRESET" != "none" ]; then DESC="$PRESET"; else DESC="images"; fi

          {
            echo "preset=$PRESET"
            echo "cuda=$CUDA"
            echo "cuda_wheel=$CUDA_WHEEL"
            echo "owner=$OWNER"
            echo "tags=${IMAGE}:latest,${IMAGE}:${DESC},${IMAGE}:sha-${SHORT}"
          } >> "$GITHUB_OUTPUT"

      # The engine lives in the NeuralEngine/ subdir; the preset script (at the
      # repo-root .github/) rewrites hyperparams.toml relative to its CWD.
      - name: Apply preset
        if: steps.cfg.outputs.preset != 'none'
        working-directory: NeuralEngine
        run: python3 "$GITHUB_WORKSPACE/.github/apply_preset.py" "${{ steps.cfg.outputs.preset }}"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: NeuralEngine
          file: NeuralEngine/Containerfile
          push: true
          build-args: |
            CUDA_BUILD=${{ steps.cfg.outputs.cuda }}
            CUDA_WHEEL=${{ steps.cfg.outputs.cuda_wheel }}
          tags: ${{ steps.cfg.outputs.tags }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          # Registry cache (GHCR, unlimited) instead of gha (10GB cap → eviction →
          # re-downloads the 2.5GB torch wheel every few builds).
          cache-from: type=registry,ref=ghcr.io/${{ steps.cfg.outputs.owner }}/neural-hex:buildcache
          cache-to: type=registry,ref=ghcr.io/${{ steps.cfg.outputs.owner }}/neural-hex:buildcache,mode=max
