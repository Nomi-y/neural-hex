name: Build and Push Image

on:
  pull_request:
    branches: [images]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Determine preset and tag
        id: preset
        run: |
          PRESET=$(echo "${{ github.event.pull_request.body }}" | grep -oP 'preset:\s*\K\S+' || echo "")
          if [ -n "$PRESET" ]; then
            echo "preset=$PRESET" >> $GITHUB_OUTPUT
            echo "tag=$PRESET" >> $GITHUB_OUTPUT
          else
            echo "preset=(none — using TOML as-is)" >> $GITHUB_OUTPUT
            echo "tag=pr-${{ github.event.number }}" >> $GITHUB_OUTPUT
          fi

      - name: Apply preset
        run: |
          PRESET="${{ steps.preset.outputs.preset }}"
          if [ "$PRESET" != "(none — using TOML as-is)" ]; then
            echo "=== Applying preset: $PRESET ==="
            python3 -c "
import tomllib
with open('hyperparams.toml','rb') as f: d = tomllib.load(f)
p = d['presets'].get('${PRESET}')
if not p:
    raise SystemExit(f'ERROR: preset \"${PRESET}\" not found in hyperparams.toml')
print(f'  {p.get(\"description\", \"(no description)\")}')
for s in ('game','net','mcts','selfplay'):
    if s in p:
        for k,v in p[s].items():
            old = d[s].get(k, '(unset)')
            d[s][k] = v
            print(f'  {s}.{k}: {old} -> {v}')
for k,v in p.get('train',{}).items():
    old = d['train'].get(k, '(unset)')
    d['train'][k] = v
    print(f'  train.{k}: {old} -> {v}')
with open('hyperparams.toml','w') as f:
    for sec in ('game','net','mcts','selfplay','train','engine'):
        if sec not in d: continue
        f.write(f'[{sec}]\n')
        for k,v in d[sec].items():
            if isinstance(v,bool): f.write(f'{k} = {str(v).lower()}\n')
            elif isinstance(v,str): f.write(f'{k} = \"{v}\"\n')
            elif isinstance(v,(int,float)): f.write(f'{k} = {v}\n')
        f.write('\n')
print('hyperparams.toml updated.')
"
          fi

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Containerfile
          push: true
          build-args: CUDA_BUILD=true
          tags: ghcr.io/${{ github.repository_owner }}/neural-hex:${{ steps.preset.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
