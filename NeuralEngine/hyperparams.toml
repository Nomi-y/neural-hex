# ============================================================================
#  NeuralEngine — Hyperparameters (single source of truth)
# ============================================================================
#
#  This file is THE place to configure your training run.  Every knob that
#  matters lives here with an explanation and suggested values.
#
#  How to use:
#    1. Edit this file
#    2. Run  ./build_container.sh          (builds & optionally tags the image)
#    3. Run  podman run --device nvidia.com/gpu=all  -v ./checkpoints:/app/checkpoints  neuralengine
#
#  The TOML is baked into the container image at build time.  You can still
#  override any value at runtime with an environment variable (e.g.
#  `podman run -e TRAIN_HOURS=2 …`), but the baked TOML is the default.
#
#  Values:  numbers are integers unless they have a decimal point.
#           booleans are true / false (lowercase).
#           strings are quoted.
# ============================================================================

# ── Game ────────────────────────────────────────────────────────────────────
[game]
board_size = 13
swap_rule = true

[net]
channels = 160
blocks = 16
value_hidden = 128

[mcts]
simulations = 600
c_puct = 1.5
dirichlet_alpha = 0.15
dirichlet_epsilon = 0.3
solver_empty_threshold = 7
solver_node_budget = 200000
use_virtual_connection = true

[selfplay]
parallel_games = 256
temperature_moves = 20
temperature = 1.0
resign_threshold = -0.95
resign_min_ply = 18

[train]
hours = 10.0
games_per_generation = 8192
replay_buffer_size = 200000
batch_size = 4096
train_steps_per_generation = 1200
learning_rate = 0.001
weight_decay = 0.0001
grad_clip = 1.0
lr_schedule = "cosine"
lr_min = 1e-05
lr_warmup_steps = 100
lr_decay = 0.5
lr_step_gens = 20
value_loss_weight = 1.0
arena_games = 160
arena_win_rate = 0.55
arena_simulations = 200
selfplay_timeout = 1800.0
arena_timeout = 900.0
checkpoint_dir = "checkpoints"
save_every_checkpoint = false
log_dir = "logs"
seed = 0
num_actors = 0

[engine]
simulations = 400
temperature = 0.0
move_budget_seconds = 5.0
backend_ws = "ws://localhost:3001"

[presets]

