# ============================================================================
#  Hex — self-hosted play engines (several at once, from GHCR)
# ============================================================================
# Spin up one or more NeuralEngine checkpoints as live opponents that connect to
# the running Hex backend and can be watched (and pitted against each other) from
# the "View Matches" tab.  Each engine needs only two things: a weight file and a
# credential — everything else is shared. The engine image is PULLED from GHCR (no
# local build); it reads each net's architecture from the mounted checkpoint, so
# one image serves any checkpoint.
#
# Prefer ONE FILE PER ENGINE?  Use docker-compose.engine.yml (singular) — a copy-
# per-engine template you start/stop independently. This file is the "run a couple
# together on this host" convenience.
#
# Prerequisites
#   1. The engine image is on GHCR (public): Actions → "Build and Push Engine Image".
#   2. The main stack is up (it creates the `hex_default` network the engines join):
#        docker compose up --build -d
#   3. Register each engine in the admin UI — http://localhost:3001/Admin →
#      Engines tab → "Register external engine".  Registration returns an
#      EngineId and a one-time Token.  Set the engine's board-size range to match
#      the checkpoint (the training-data checkpoints here are 11x11).
#   4. Copy the env template and fill in the ids/tokens:
#        cp .env.engines.example .env.engines
#
# Run
#   docker compose -f docker-compose.engines.yml --env-file .env.engines up -d
#
# Add more engines
#   Copy an `engineN` service block, give it a new checkpoint mount and its own
#   ENGINEn_ID / ENGINEn_TOKEN.  The image is pulled once and reused by every engine.
# ============================================================================

name: hex-engines

# Shared engine definition — every engine service merges this and only overrides
# its credentials and weight file.
x-engine: &engine
  # CI-built engine image from GHCR (HEX_ROLE=engine → runs engine.play_engine by default).
  # Pin a wheel/sha: …neural-hex-engine:cu121 (Turing→Ada) / :cu128 (Blackwell) / :sha-<commit>.
  image: ${ENGINE_IMAGE:-ghcr.io/nomi-y/neural-hex-engine:latest}
  pull_policy: always
  environment: &engine-env
    HEX_ROLE: engine                      # run the play engine (also the engine image's default)
    ENGINE_WS: ws://backend:3001          # the backend service name on the shared network
    MODEL_PATH: /weights/model.pt         # where each service mounts its checkpoint
    DEVICE: ${ENGINE_DEVICE:-cuda}        # cuda uses the GPU (needs the devices: entry below); cpu also works
    ENGINE_SIMS: ${ENGINE_SIMS:-400}      # MCTS sims/move — lower is faster/weaker
  # GPU access via the NVIDIA Container Toolkit's CDI spec (/etc/cdi/nvidia.yaml). Drop this block (and
  # set ENGINE_DEVICE=cpu, use a :cpu image tag) to run CPU-only on a host without a GPU.
  devices:
    - nvidia.com/gpu=all
  networks: [hexnet]
  restart: unless-stopped

services:
  engine1:
    <<: *engine
    environment:
      <<: *engine-env
      ENGINE_ID: ${ENGINE1_ID:?set ENGINE1_ID in .env.engines}
      ENGINE_TOKEN: ${ENGINE1_TOKEN:?set ENGINE1_TOKEN in .env.engines}
    volumes:
      - ${ENGINE1_MODEL:-./training-data/run1/checkpoints/best.pt}:/weights/model.pt:ro

  engine2:
    <<: *engine
    environment:
      <<: *engine-env
      ENGINE_ID: ${ENGINE2_ID:?set ENGINE2_ID in .env.engines}
      ENGINE_TOKEN: ${ENGINE2_TOKEN:?set ENGINE2_TOKEN in .env.engines}
    volumes:
      - ${ENGINE2_MODEL:-./training-data/run2/checkpoints/best.pt}:/weights/model.pt:ro

# Join the network the main stack created so engines can reach ws://backend:3001.
networks:
  hexnet:
    external: true
    name: hex_default
